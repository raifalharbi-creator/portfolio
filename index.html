// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

    </script>

// ===== inlined from shared/macbook.jsx =====
// MacBook Pro 16" mockup. Realistic-ish bezels, notch, base, subtle screen sheen.

//
// Sizing model: pass `width` (in px) — everything scales proportionally.
// 16" MBP screen ratio is ~16:10. We use the inner screen as 1728×1080 native;

function MacBookFrame({
  children,

  caption,

  const baseHeight = Math.round(width * 0.014);
  const baseLip = Math.round(width * 0.05);

              width: '100%',

}

    <script type="text/babel">
// ===== inlined from shared/sketches.jsx =====
// Hand-drawn-style SVG sketch primitives for the Explore section.
// All paths are deliberately wobbly. Stroke uses the page's accent color.
// Dimensions: each Sketch is rendered inside a 320×220 viewBox unless overridden.

function _wobble(seed = 1, amp = 1.2) {
  // Returns a small per-call offset that's stable per render
  return ((Math.sin(seed * 12.9898) * 43758.5453) % 1) * amp - amp / 2;
}

// A sketchy rectangle with slightly off corners
function SketchRect({ x, y, w, h, stroke = 'currentColor', sw = 1.4, fill = 'none', dash, seed = 1 }) {
  const o = (s) => _wobble(seed + s, 2.0);
  const x1 = x + o(1), y1 = y + o(2);
  const x2 = x + w + o(3), y2 = y + o(4);
  const x3 = x + w + o(5), y3 = y + h + o(6);
  const x4 = x + o(7), y4 = y + h + o(8);
  const d = `M${x1},${y1} L${x2},${y2} L${x3},${y3} L${x4},${y4} Z`;
  return <path d={d} stroke={stroke} strokeWidth={sw} fill={fill} strokeLinecap="round" strokeLinejoin="round" strokeDasharray={dash} />;
}

// A sketchy line
function SketchLine({ x1, y1, x2, y2, stroke = 'currentColor', sw = 1.3, dash, seed = 1 }) {
  const o = (s) => _wobble(seed + s, 1.6);
  const mx = (x1 + x2) / 2 + o(1);
  const my = (y1 + y2) / 2 + o(2);
  return <path d={`M${x1},${y1} Q${mx},${my} ${x2},${y2}`} stroke={stroke} strokeWidth={sw} fill="none" strokeLinecap="round" strokeDasharray={dash} />;
}

// A sketchy hand-drawn arrow head
function SketchArrow({ x1, y1, x2, y2, stroke = 'currentColor', sw = 1.4, seed = 1 }) {
  const angle = Math.atan2(y2 - y1, x2 - x1);
  const len = 10;
  const a1 = angle + Math.PI - 0.5;
  const a2 = angle + Math.PI + 0.5;
  return (
    <g>
      <SketchLine x1={x1} y1={y1} x2={x2} y2={y2} stroke={stroke} sw={sw} seed={seed} />
      <path
        d={`M${x2},${y2} L${x2 + Math.cos(a1) * len},${y2 + Math.sin(a1) * len} M${x2},${y2} L${x2 + Math.cos(a2) * len},${y2 + Math.sin(a2) * len}`}
        stroke={stroke} strokeWidth={sw} fill="none" strokeLinecap="round"
      />
    </g>
  );
}

// Hatched fill (parallel diagonal lines inside a rect)
function SketchHatch({ x, y, w, h, stroke = 'currentColor', sw = 0.8, gap = 6, seed = 1 }) {
  const lines = [];
  for (let i = -h; i < w; i += gap) {
    const lx1 = x + i;
    const ly1 = y;
    const lx2 = x + i + h;
    const ly2 = y + h;
    // clip-ish: only render the part inside the rect (we'll let the SVG mask it visually with stroke)
    const cx1 = Math.max(lx1, x);
    const cy1 = ly1 + (cx1 - lx1);
    const cx2 = Math.min(lx2, x + w);
    const cy2 = ly1 + (cx2 - lx1);
    if (cx1 < cx2 && cy1 < y + h && cy2 > y) {
      lines.push(<SketchLine key={i} x1={cx1} y1={Math.max(cy1, y)} x2={cx2} y2={Math.min(cy2, y + h)} stroke={stroke} sw={sw} seed={seed + i} />);
    }
  }
  return <g>{lines}</g>;
}

// Hand-written-style label using a rough cursive-y font
function SketchLabel({ x, y, children, color = 'currentColor', size = 13 }) {
  return (
    <text x={x} y={y} fill={color} fontFamily="'Caveat', 'Patrick Hand', 'Comic Sans MS', cursive" fontSize={size} fontWeight={500}>
      {children}
    </text>
  );
}

// A scribble (zigzag) used to indicate "lots of options" or "pile of stuff"
function SketchScribble({ x, y, w, h, stroke = 'currentColor', sw = 1.1, seed = 1 }) {
  let d = `M${x},${y + h * 0.5}`;
  const steps = 8;
  for (let i = 1; i <= steps; i++) {
    const px = x + (w * i) / steps;
    const py = y + (i % 2 === 0 ? h * 0.2 : h * 0.85) + _wobble(seed + i, 4);
    d += ` Q${px - w / steps / 2},${py} ${px},${y + h * 0.5 + _wobble(seed + i + 100, 2)}`;
  }
  return <path d={d} stroke={stroke} strokeWidth={sw} fill="none" strokeLinecap="round" />;
}

// Frame for a sketch concept — rounded rect with a hand-written caption beneath
function SketchFrame({ children, label, w = 360, h = 240, accent = 'currentColor' }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
      <div style={{ width: w, height: h, position: 'relative' }}>
        <svg viewBox={`0 0 ${w} ${h}`} width="100%" height="100%" style={{ overflow: 'visible' }}>
          {/* Surrounding sketch rect */}
          <SketchRect x={6} y={6} w={w - 12} h={h - 12} stroke="currentColor" sw={1.6} seed={42} />
          {children}
        </svg>
      </div>
      {label && (
        <div style={{
          fontFamily: "'Caveat', 'Patrick Hand', cursive",
          fontSize: 22,
          color: accent,
          letterSpacing: 0.5,
        }}>{label}</div>
      )}
    </div>
  );
}

// A simple sentiment journey — dots on a wavy line, with stage labels.
function SketchJourney({ steps, accent = 'currentColor', mut = '#888' }) {
  const w = 760, h = 220;
  const pad = 60;
  const innerW = w - pad * 2;
  const ys = steps.map(s => h * 0.5 - (s.score * 50)); // score in [-1, 1]
  const points = steps.map((_, i) => [pad + (innerW * i) / (steps.length - 1), ys[i]]);
  // Build a wavy path through points
  let d = `M${points[0][0]},${points[0][1]}`;
  for (let i = 1; i < points.length; i++) {
    const [x1, y1] = points[i - 1];
    const [x2, y2] = points[i];
    const cx = (x1 + x2) / 2;
    d += ` Q${cx},${y1} ${x2},${y2}`;
  }
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" style={{ overflow: 'visible' }}>
      {/* baseline */}
      <line x1={pad} y1={h * 0.5} x2={w - pad} y2={h * 0.5} stroke={mut} strokeWidth={0.5} strokeDasharray="4 4" />
      <text x={pad - 8} y={h * 0.5 - 50 + 4} fill={mut} fontSize={10} textAnchor="end" fontFamily="'JetBrains Mono', monospace">+ delight</text>
      <text x={pad - 8} y={h * 0.5 + 4} fill={mut} fontSize={10} textAnchor="end" fontFamily="'JetBrains Mono', monospace">neutral</text>
      <text x={pad - 8} y={h * 0.5 + 50 + 4} fill={mut} fontSize={10} textAnchor="end" fontFamily="'JetBrains Mono', monospace">low</text>
      {/* the journey curve */}
      <path d={d} stroke={accent} strokeWidth={2.2} fill="none" strokeLinecap="round" />
      {/* dots + labels */}
      {points.map(([x, y], i) => (
        <g key={i}>
          <circle cx={x} cy={y} r={5} fill={accent} />
          <text x={x} y={y - 14} fill="currentColor" fontSize={12} textAnchor="middle" fontWeight={600}>{steps[i].label}</text>
          <text x={x} y={h - 12} fill={mut} fontSize={11} textAnchor="middle" fontFamily="'JetBrains Mono', monospace">{String(i + 1).padStart(2, '0')}</text>
          {steps[i].note && (
            <text x={x} y={y + 24} fill={mut} fontSize={11} textAnchor="middle" fontFamily="'Caveat', cursive" fontWeight={500} fontStyle="italic">"{steps[i].note}"</text>
          )}
        </g>
      ))}
    </svg>
  );
}

Object.assign(window, { SketchRect, SketchLine, SketchArrow, SketchHatch, SketchLabel, SketchScribble, SketchFrame, SketchJourney });

  const borderColor = dark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)';
  const labelColor = dark ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.5)';
  return (
    <figure style={{ margin: 0, maxWidth, width: '100%' }}>
      {label && (
        <figcaption style={{
          fontFamily: 'JetBrains Mono, ui-monospace, monospace',
          fontSize: 11,
          letterSpacing: 0.6,
          textTransform: 'uppercase',
          color: labelColor,
          marginBottom: 14,
        }}>{label}</figcaption>
      )}
      <div style={{
        width: '100%',
        borderRadius: 14,
        overflow: 'hidden',
        boxShadow: `0 0 0 0.5px ${borderColor}, 0 24px 48px -24px rgba(20,18,14,0.2), 0 6px 16px -8px rgba(20,18,14,0.12)`,
        background: '#fff',
        position: 'relative',
      }}>
        <img
          src={src}
          alt={alt || ''}
          style={{ width: '100%', height: 'auto', display: 'block' }}
        />
      </div>
      {caption && (
        <figcaption style={{
          marginTop: 16,
          fontSize: 13,
          lineHeight: 1.5,
          color: dark ? 'rgba(255,255,255,0.55)' : 'rgba(0,0,0,0.55)',
          fontStyle: 'italic',
          textWrap: 'pretty',
        }}>{caption}</figcaption>
      )}
    </figure>
  );
}

// Wraps children in an IntersectionObserver-driven reveal: fades + slides up
// on first enter, then sits still. Respects prefers-reduced-motion.
function RevealOnScroll({ children, delay = 0, style = {} }) {
  const ref = React.useRef(null);
  const [seen, setSeen] = React.useState(false);
  React.useEffect(() => {
    const reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduced) {setSeen(true);return;}
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {if (e.isIntersecting) {setSeen(true);io.disconnect();}});
    }, { rootMargin: '0px 0px -10% 0px', threshold: 0.1 });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return (
    <div ref={ref} style={{
      ...style,
      opacity: seen ? 1 : 0,
      transform: seen ? 'translateY(0)' : 'translateY(24px)',
      transition: `opacity 700ms cubic-bezier(.2,.7,.2,1) ${delay}ms, transform 700ms cubic-bezier(.2,.7,.2,1) ${delay}ms`
    }}>
      {children}
    </div>);

}

// ImgScreen helper (kept here for the hero/solution MacBook frames).
// Now fills 100% with object-fit: fill (no crop, no letterbox) — the parent
// MacBookFrame is sized to the image's exact aspect via IMG_ASPECTS.
function ImgScreen({ src, alt, bg = '#fff' }) {
  return (
    <div style={{ width: '100%', height: '100%', background: bg, position: 'relative', overflow: 'hidden' }}>
      <img
        src={src}
        alt={alt || ''}
        style={{
          width: '100%',
          height: '100%',
          objectFit: 'fill',
          display: 'block',
        }}
      />
    </div>
  );
}

      function CustomCursor({ kind, accent }) {
        const [pos, setPos] = React.useState({ x: -100, y: -100 });
        const [down, setDown] = React.useState(false);
        React.useEffect(() => {
          if (kind === 'default') return;
          const move = (e) => setPos({ x: e.clientX, y: e.clientY });
          const dn = () => setDown(true);
          const up = () => setDown(false);
          window.addEventListener('pointermove', move);
          window.addEventListener('pointerdown', dn);
          window.addEventListener('pointerup', up);
          return () => {
            window.removeEventListener('pointermove', move);
            window.removeEventListener('pointerdown', dn);
            window.removeEventListener('pointerup', up);
          };
        }, [kind]);
        if (kind === 'default') return null;
        const common = {
          position: 'fixed', top: 0, left: 0, pointerEvents: 'none', zIndex: 2147483647,
          transform: `translate(${pos.x}px, ${pos.y}px) translate(-50%, -50%)`,
          transition: 'width .12s, height .12s, opacity .12s',
        };
        if (kind === 'dot') {
          return <div style={{ ...common, width: down ? 24 : 14, height: down ? 24 : 14, borderRadius: '50%', background: accent, mixBlendMode: 'multiply', opacity: 0.85 }} />;
        }
        if (kind === 'ring') {
          return (<>
            <div style={{ ...common, width: down ? 36 : 28, height: down ? 36 : 28, borderRadius: '50%', border: `1.5px solid ${accent}`, mixBlendMode: 'difference' }} />
            <div style={{ ...common, width: 4, height: 4, borderRadius: '50%', background: accent }} />
          </>);
        }
        if (kind === 'crosshair') {
          return (<>
            <div style={{ ...common, width: 22, height: 1, background: accent, mixBlendMode: 'difference' }} />
            <div style={{ ...common, width: 1, height: 22, background: accent, mixBlendMode: 'difference' }} />
          </>);
        }
        return null;
      }

      // ---- Hash-based router ----
      function useHashRoute() {
        const [route, setRoute] = React.useState(window.location.hash.replace('#', '') || 'home');
        React.useEffect(() => {
          const onHash = () => setRoute(window.location.hash.replace('#', '') || 'home');
          window.addEventListener('hashchange', onHash);
          return () => window.removeEventListener('hashchange', onHash);
        }, []);
        const go = React.useCallback((to) => {
          window.location.hash = to;
          window.scrollTo({ top: 0, behavior: 'instant' });
        }, []);
        return [route, go];
      }

      // Wrap the home (playful direction) so its tile clicks deep-link into the case study.
      // The original PlayfulDirection doesn't accept onSelectProject; we intercept via document-level
      // click handler scoped to the home view container.
      function HomeWithLinks({ accent, dark, go }) {
        // Inject an onClick on each project tile via a wrapping div + delegated handler.
        // Since the existing PlayfulDirection already renders project tiles, we set a delegated handler.
        const ref = React.useRef(null);
        React.useEffect(() => {
          if (!ref.current) return;
          const articles = ref.current.querySelectorAll('article');
          // Map projects -> their ids in PROJECTS order. All 4 have case studies now.
          const ids = (window.PROJECTS || []).map(p => p.id);
          const handlers = [];
          articles.forEach((art, i) => {
            const id = ids[i];
            if (!id) return;
            const h = () => go(`case/${id}`);
            art.style.cursor = 'pointer';
            art.addEventListener('click', h);
            handlers.push([art, h]);
          });
          // Wire nav <span>Work</span> / <span>About</span> to routes.
          const navSpans = ref.current.querySelectorAll('header nav > span');
          navSpans.forEach((sp) => {
            const txt = (sp.textContent || '').trim().toLowerCase();
            if (txt === 'work' || txt === 'about') {
              sp.style.cursor = 'pointer';
              const h = () => go(txt);
              sp.addEventListener('click', h);
              handlers.push([sp, h]);
            }
          });
          return () => handlers.forEach(([el, h]) => el.removeEventListener('click', h));
        });

        return (
          <div ref={ref}>
            <PlayfulDirection accent={accent} dark={dark} />
          </div>
        );
      }

      function App() {
        const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
        const dark = t.theme === 'dark';
        const [route, go] = useHashRoute();

        // Apply type pair globally
        const typeCss = {
          default: '',
          serifHeavy: `body, [data-cs] { font-family: "Fraunces", "EB Garamond", serif !important; }`,
          monoFirst: `body h1, body h2 { font-family: "JetBrains Mono", ui-monospace, monospace !important; letter-spacing: -0.04em !important; }`,
          condensed: `body h1, body h2 { font-stretch: 75% !important; font-variation-settings: "wdth" 75 !important; letter-spacing: -0.02em !important; }`,
        }[t.typePair] || '';

        let view;
        if (route === 'work') {
          view = <WorkPage accent={t.accent} dark={dark} go={go} />;
        } else if (route === 'about') {
          view = <AboutPage accent={t.accent} dark={dark} go={go} />;
        } else if (route.startsWith('case/')) {
          const id = route.split('/')[1];
          if (['plai','trace','bereal','newscorp'].includes(id)) {
            view = (
              <PlayfulCaseStudy
                which={id}
                accent={t.accent}
                dark={dark}
                onBack={(nextId) => go(typeof nextId === 'string' ? `case/${nextId}` : 'home')}
              />
            );
          } else {
            view = <HomeWithLinks accent={t.accent} dark={dark} go={go} />;
          }
        } else {
          view = <HomeWithLinks accent={t.accent} dark={dark} go={go} />;
        }

        return (
          <>
            <style>{typeCss}</style>
            <CustomCursor kind={t.cursor} accent={t.accent} />
            {view}

            <TweaksPanel title="Tweaks">
              <TweakSection label="Theme">
                <TweakRadio label="Mode" value={t.theme} options={['light', 'dark']} onChange={(v) => setTweak('theme', v)} />
              </TweakSection>
              <TweakSection label="Typography">
                <TweakSelect
                  label="Pairing"
                  value={t.typePair}
                  options={[
                    { value: 'default', label: 'Default (Inter + Instrument Serif)' },
                    { value: 'serifHeavy', label: 'Serif-heavy (Fraunces)' },
                    { value: 'monoFirst', label: 'Mono-first (JetBrains)' },
                    { value: 'condensed', label: 'Condensed sans' },
                  ]}
                  onChange={(v) => setTweak('typePair', v)}
                />
              </TweakSection>
              <TweakSection label="Cursor">
                <TweakRadio
                  label="Style"
                  value={t.cursor}
                  options={[
                    { value: 'default', label: 'OS' },
                    { value: 'dot', label: 'Dot' },
                    { value: 'ring', label: 'Ring' },
                    { value: 'crosshair', label: 'Cross' },
                  ]}
                  onChange={(v) => setTweak('cursor', v)}
                />
              </TweakSection>
              <TweakSection label="Accent">
                <TweakColor label="Accent color" value={t.accent} onChange={(v) => setTweak('accent', v)} />
              </TweakSection>
              <TweakSection label="Navigate">
                <TweakButton label="Home"  onClick={() => go('home')} />
                <TweakButton label="Work"  onClick={() => go('work')} />
                <TweakButton label="About" onClick={() => go('about')} />
                <TweakButton label="Plai case study"  onClick={() => go('case/plai')} />
                <TweakButton label="Trace case study" onClick={() => go('case/trace')} />
                <TweakButton label="BeReal case study" onClick={() => go('case/bereal')} />
                <TweakButton label="News Corp case study" onClick={() => go('case/newscorp')} />
              </TweakSection>
            </TweaksPanel>
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById('app')).render(<App />);
    </script>
  </body>
</html>
